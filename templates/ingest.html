{% extends 'base.html' %}
{% block title %}Ingest - Brick AI{% endblock %}
{% block content %}

<div style="margin-bottom:1.5rem;">
  <h1 class="page-title">Ingest brick</h1>
  <p class="muted small">Add a new brick to the catalog with its details and image</p>
  <span class="brush-stroke"></span>
</div>

<form method="post" enctype="multipart/form-data" class="card card--accent" style="max-width:900px;">
  <label for="image">Brick image</label>
  <input id="image" type="file" name="image" accept="image/*" required />

  <div class="grid" style="margin-top:0.75rem;">
    <div>
      <label>Brick name</label>
      <input name="brick_name" placeholder="e.g. Olde English Red" />
    </div>
    <div>
      <label>Item number</label>
      <input name="item_number" placeholder="SKU / stock code" />
    </div>
    <div>
      <label>Colour</label>
      <input name="brick_colour" placeholder="e.g. Red" />
    </div>
    <div>
      <label>Type</label>
      <input name="brick_type" placeholder="e.g. Wirecut, Handmade" />
    </div>
    <div>
      <label>Brand</label>
      <input name="brand" placeholder="e.g. Wienerberger" />
    </div>
    <div>
      <label>Material</label>
      <input name="material" placeholder="e.g. Clay, Concrete" />
    </div>
    <div>
      <label>Factory code</label>
      <input name="factory_code" />
    </div>
    <div>
      <label>Factory region</label>
      <input name="factory_region" />
    </div>
    <div>
      <label>ASP T1</label>
      <input name="asp_T1" />
    </div>
    <div>
      <label>ASP T2</label>
      <input name="asp_T2" />
    </div>
    <div>
      <label>ASP T3</label>
      <input name="asp_T3" />
    </div>
    <div>
      <label>ASP T4</label>
      <input name="asp_T4" />
    </div>
  </div>

  <div style="margin-top:1.25rem;">
    <button type="submit">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:0.25rem;">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Ingest
    </button>
  </div>
</form>

{% endblock %}
