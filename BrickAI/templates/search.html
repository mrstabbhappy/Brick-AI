{% extends 'base.html' %}
{% block title %}AI Search - Brick AI{% endblock %}
{% block content %}

<div style="max-width:680px;margin:0 auto;padding:2rem 0;text-align:center;">
  <h1 class="page-title" style="font-size:var(--text-3xl);">Search by brick image</h1>
  <p class="muted" style="margin:0.5rem 0 2rem;">Upload a brick photo to find similar matches</p>
  <span class="brush-stroke" style="margin:0 auto 2rem;"></span>

  <form method="post" enctype="multipart/form-data" class="card card--accent" style="text-align:left;">
    <label for="image">Select brick image</label>
    <div class="upload-area" onclick="document.getElementById('image').click();" style="margin-bottom:1rem;">
      <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
      </svg>
      <div style="font-weight:600;margin-top:0.5rem;">Drop your image here or click to browse</div>
      <div class="muted small" style="margin-top:0.25rem;">JPG, PNG, WEBP supported</div>
    </div>
    <input id="image" type="file" name="image" accept="image/*" required style="display:none;" />

    <label for="top_k">Number of results</label>
    <input id="top_k" type="number" name="top_k" value="10" min="1" max="50" />

    <div style="margin-top:1.25rem;">
      <button type="submit" style="width:100%;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:0.25rem;">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        Find matches
      </button>
    </div>
  </form>
</div>

<script>
  // Show selected file name
  document.getElementById('image').addEventListener('change', function() {
    const area = document.querySelector('.upload-area');
    if (this.files.length) {
      area.innerHTML = '<div style="font-weight:600;color:var(--tw-grape);">' + this.files[0].name + '</div><div class="muted small">Click to change</div>';
    }
  });
</script>

{% endblock %}
