{% extends 'base.html' %}
{% block title %}Register - Brick AI{% endblock %}
{% block content %}
<div style="max-width:480px;margin:3rem auto;">
  <div class="card card--accent">
    <h1 style="margin:0 0 0.25rem;">Create account</h1>
    <p class="muted" style="margin:0 0 0.5rem;font-size:var(--text-sm);">Set up your Brick AI account</p>
    <span class="brush-stroke"></span>

    <form method="post" style="margin-top:1rem;">
      <label for="username">Username</label>
      <input id="username" name="username" required autofocus />
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required />
      <label for="password">Password</label>
      <input id="password" name="password" type="password" required />
      <label for="bu_code">Region / BU code</label>
      <input id="bu_code" name="bu_code" placeholder="e.g. LON, MAN" />
      <div style="margin-top:1.25rem;">
        <button type="submit" style="width:100%;">Create account</button>
      </div>
    </form>

    <div style="margin-top:1.5rem;text-align:center;padding-top:1rem;border-top:1px solid var(--border-light);">
      <p class="muted" style="margin:0;font-size:var(--text-sm);">
        Already have an account?
        <a href="{{ url_for('login') }}" style="font-weight:600;">Log in here</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
